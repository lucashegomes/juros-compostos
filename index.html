<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Juros Compostos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
        }
        .calculator {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        .calculator h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .form-group button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .form-group button:hover {
            background-color: #0056b3;
        }
        .results {
            margin-top: 20px;
        }
        .pagination {
            display: flex;
            justify-content: flex-start;
            margin-top: 25px;
            flex-wrap: wrap;
        }
        .pagination button {
            margin: 0 5px;
            padding: 5px 10px;
            border: 1px solid #007bff;
            background: white;
            color: #007bff;
            border-radius: 4px;
            cursor: pointer;
        }
        .pagination button.active {
            background: #007bff;
            color: white;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>Calculadora de Juros Compostos</h1>
        <div class="form-group">
            <label for="initialAmount">Valor Inicial:</label>
            <input type="number" id="initialAmount" placeholder="Ex: 1000">
        </div>
        <div class="form-group">
            <label for="interestRate">Taxa de Juros (%):</label>
            <input type="number" id="interestRate" placeholder="Ex: 5">
        </div>
        <div class="form-group">
            <label for="contribution">Valor do Aporte:</label>
            <input type="number" id="contribution" placeholder="Ex: 100">
        </div>
        <div class="form-group">
            <label for="time">Tempo de Aporte:</label>
            <input type="number" id="time" placeholder="Ex: 12">
        </div>
        <div class="form-group">
            <label for="timeType">Tipo de Tempo:</label>
            <select id="timeType">
                <option value="monthly">Mensal</option>
                <option value="yearly">Anual</option>
            </select>
        </div>
        <div class="form-group">
            <label for="rateType">Tipo de Taxa:</label>
            <select id="rateType">
                <option value="monthly">Mensal</option>
                <option value="yearly">Anual</option>
            </select>
        </div>
        <div class="form-group">
            <button onclick="calculateCompoundInterest()">Calcular</button>
        </div>
        <div class="results">
            <div id="results"></div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script>
        let results = [];
        let currentPage = 1;
        const resultsPerPage = 12   ;

        function calculateCompoundInterest() {
            const initialAmount = parseFloat(document.getElementById('initialAmount').value);
            const interestRate = parseFloat(document.getElementById('interestRate').value);
            const contribution = parseFloat(document.getElementById('contribution').value);
            const time = parseInt(document.getElementById('time').value);
            const timeType = document.getElementById('timeType').value;
            const rateType = document.getElementById('rateType').value;

            if (isNaN(initialAmount) || isNaN(interestRate) || isNaN(contribution) || isNaN(time)) {
                alert('Por favor, preencha todos os campos corretamente.');
                return;
            }

            const monthlyRate = rateType === 'yearly' ? interestRate / 12 / 100 : interestRate / 100;
            const totalMonths = timeType === 'yearly' ? time * 12 : time;

            results = [];
            let balance = initialAmount;

            for (let i = 1; i <= totalMonths; i++) {
                balance += contribution;
                balance *= (1 + monthlyRate);
                results.push({ month: i, balance: balance.toFixed(2) });
            }

            currentPage = 1;
            displayResults();
        }

        function displayResults() {
            const resultsContainer = document.getElementById('results');
            const paginationContainer = document.getElementById('pagination');

            resultsContainer.innerHTML = '';
            paginationContainer.innerHTML = '';

            const startIndex = (currentPage - 1) * resultsPerPage;
            const endIndex = Math.min(startIndex + resultsPerPage, results.length);

            for (let i = startIndex; i < endIndex; i++) {
                const result = results[i];
                const resultDiv = document.createElement('div');
                const valor = new Intl.NumberFormat('pt-BR', {
                    style: 'currency',
                    currency: 'BRL',
                });

                resultDiv.textContent = `Mês ${result.month}: ${valor.format(result.balance)}`;
                resultsContainer.appendChild(resultDiv);
            }

            const totalPages = Math.ceil(results.length / resultsPerPage);

            for (let i = 1; i <= totalPages; i++) {
                const button = document.createElement('button');
                button.textContent = i < 10 ? `0${i}` : i;
                button.className = i === currentPage ? 'active' : '';
                button.onclick = () => {
                    currentPage = i;
                    displayResults();
                };
                paginationContainer.appendChild(button);
            }
        }
    </script>
</body>
</html>
